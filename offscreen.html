<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SwitchyOmega Offscreen</title>
</head>
<body>
  <canvas id="canvas-icon" width="19" height="19"></canvas>
  
  <script src="js/log_error.js"></script>
  <script src="img/icons/draw_omega.js"></script>
  <script>
    // 处理来自 Service Worker 的绘图请求
    chrome.runtime.onMessage.addListener((message, sender, sendResponse) => {
      if (message.type === 'draw-icon') {
        try {
          const canvas = document.getElementById('canvas-icon');
          const ctx = canvas.getContext('2d');
          
          // 使用现有的绘图逻辑
          if (typeof drawOmegaIcon !== 'undefined') {
            drawOmegaIcon(ctx, message.profile, message.options);
          }
          
          // 返回 ImageData
          const imageData = ctx.getImageData(0, 0, 19, 19);
          sendResponse({ imageData });
        } catch (error) {
          console.error('Icon drawing failed:', error);
          sendResponse({ error: error.message });
        }
      }
    });
    
    console.log('SwitchyOmega Offscreen document loaded');
  </script>
</body>
</html>
